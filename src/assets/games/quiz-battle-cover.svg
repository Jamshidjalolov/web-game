<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Quiz Battle Premium Cover</title>
  <desc id="desc">Premium uslubdagi quiz battle o'yini uchun sahna ko'rinishi</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06203f"/>
      <stop offset="35%" stop-color="#0b3e75"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cyanNeon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="pinkNeon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="960" height="540" rx="40" fill="url(#bg)"/>
  <circle cx="130" cy="80" r="120" fill="#22d3ee" fill-opacity="0.18"/>
  <circle cx="860" cy="460" r="160" fill="#f472b6" fill-opacity="0.16"/>
  <circle cx="820" cy="90" r="70" fill="#fbbf24" fill-opacity="0.18"/>

  <rect x="48" y="48" width="864" height="444" rx="34" fill="url(#panel)" stroke="#93c5fd" stroke-opacity="0.38" stroke-width="2"/>

  <rect x="94" y="96" width="772" height="62" rx="18" fill="#0b1227" stroke="#1f2a44" stroke-width="2"/>
  <text x="118" y="136" font-family="Nunito, Arial, sans-serif" font-size="26" font-weight="900" fill="#e2e8f0" letter-spacing="2">QUIZ BATTLE</text>
  <g transform="translate(690,95)">
    <rect x="0" y="0" width="78" height="56" rx="14" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="39" y="22" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="10" font-weight="800" fill="#94a3b8" letter-spacing="1">JAMOA A</text>
    <text x="39" y="45" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="20" font-weight="900" fill="#38bdf8">120</text>
  </g>
  <g transform="translate(778,95)">
    <rect x="0" y="0" width="78" height="56" rx="14" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="39" y="22" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="10" font-weight="800" fill="#94a3b8" letter-spacing="1">JAMOA B</text>
    <text x="39" y="45" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="20" font-weight="900" fill="#f472b6">110</text>
  </g>

  <rect x="100" y="182" width="350" height="256" rx="24" fill="#020617" fill-opacity="0.46" stroke="#334155" stroke-width="2"/>
  <text x="128" y="228" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="800" fill="#f8fafc">Savol 3 / 10</text>
  <text x="128" y="264" font-family="Nunito, Arial, sans-serif" font-size="27" font-weight="900" fill="#e2e8f0">Qaysi davlat poytaxti</text>
  <text x="128" y="296" font-family="Nunito, Arial, sans-serif" font-size="27" font-weight="900" fill="#e2e8f0">Toshkent?</text>

  <rect x="122" y="322" width="142" height="44" rx="14" fill="#1d4ed8"/>
  <text x="193" y="351" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">A) Qozog'iston</text>
  <rect x="282" y="322" width="142" height="44" rx="14" fill="#16a34a"/>
  <text x="353" y="351" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">B) O'zbekiston</text>
  <rect x="122" y="376" width="142" height="44" rx="14" fill="#f59e0b"/>
  <text x="193" y="405" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="800" fill="#111827">C) Turkiya</text>
  <rect x="282" y="376" width="142" height="44" rx="14" fill="#db2777"/>
  <text x="353" y="405" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">D) Misr</text>

  <rect x="488" y="182" width="372" height="256" rx="24" fill="#020617" fill-opacity="0.5" stroke="#334155" stroke-width="2"/>
  <rect x="512" y="206" width="324" height="76" rx="18" fill="#111827"/>
  <text x="674" y="236" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="14" font-weight="800" fill="#94a3b8" letter-spacing="1">LIVE ROUND</text>
  <text x="674" y="268" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="30" font-weight="900" fill="#f8fafc">Final Duel</text>

  <g transform="translate(534,307)">
    <rect x="0" y="0" width="126" height="108" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.8" stroke-width="2"/>
    <text x="63" y="33" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="12" font-weight="800" fill="#7dd3fc" letter-spacing="1">TEAM A</text>
    <text x="63" y="74" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="44" font-weight="900" fill="#e0f2fe">12</text>
    <rect x="20" y="86" width="86" height="9" rx="5" fill="url(#cyanNeon)" filter="url(#softGlow)"/>
  </g>
  <g transform="translate(690,307)">
    <rect x="0" y="0" width="126" height="108" rx="18" fill="#0f172a" stroke="#f472b6" stroke-opacity="0.82" stroke-width="2"/>
    <text x="63" y="33" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="12" font-weight="800" fill="#f9a8d4" letter-spacing="1">TEAM B</text>
    <text x="63" y="74" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="44" font-weight="900" fill="#fdf2f8">11</text>
    <rect x="20" y="86" width="86" height="9" rx="5" fill="url(#pinkNeon)" filter="url(#softGlow)"/>
  </g>

  <g transform="translate(412,430)">
    <rect x="-175" y="-24" width="350" height="58" rx="20" fill="url(#gold)" fill-opacity="0.15" stroke="url(#gold)" stroke-width="2"/>
    <text x="0" y="13" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="33" font-weight="900" fill="url(#gold)" letter-spacing="1">PREMIUM QUIZ NIGHT</text>
  </g>
</svg>
