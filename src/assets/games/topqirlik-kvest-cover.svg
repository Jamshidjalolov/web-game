    <text x="58" y="58" font-family="Nunito, Arial, sans-serif" font-size="14" font-weight="800" fill="#67e8f9">1-JAMOA</text>
    <text x="128" y="58" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="900" fill="#e0f2fe">24</text>
    <text x="188" y="58" font-family="Nunito, Arial, sans-serif" font-size="14" font-weight="800" fill="#f9a8d4">2-JAMOA</text>
    <text x="258" y="58" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="900" fill="#fdf2f8">22</text>
  </g>

  <g transform="translate(475 468)">
    <rect x="-205" y="-24" width="410" height="56" rx="18" fill="url(#gold)" fill-opacity="0.14" stroke="url(#gold)" stroke-width="2"/>
    <text x="0" y="12" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="32" font-weight="900" fill="url(#gold)" letter-spacing="1">QUEST MASTER MODE</text>
