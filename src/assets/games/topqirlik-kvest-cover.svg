<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Topqirlik Kvesti Premium Cover</title>
  <desc id="desc">Topqirlik kvesti uchun sarguzasht ruhidagi premium o'yin cover rasmi</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091b3d"/>
      <stop offset="45%" stop-color="#132c66"/>
      <stop offset="100%" stop-color="#432574"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1735" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1c2547" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="960" height="540" rx="40" fill="url(#bg)"/>
  <circle cx="120" cy="86" r="116" fill="#22d3ee" fill-opacity="0.16"/>
  <circle cx="864" cy="450" r="160" fill="#f472b6" fill-opacity="0.12"/>
  <circle cx="818" cy="88" r="74" fill="#fde68a" fill-opacity="0.16"/>

  <rect x="42" y="42" width="876" height="456" rx="34" fill="url(#panel)" stroke="#93c5fd" stroke-opacity="0.3" stroke-width="2"/>

  <rect x="78" y="84" width="804" height="66" rx="18" fill="#0b1229" stroke="#334155" stroke-width="2"/>
  <text x="106" y="126" font-family="Nunito, Arial, sans-serif" font-size="28" font-weight="900" fill="#e2e8f0" letter-spacing="2">TOPQIRLIK KVESTI</text>
  <rect x="734" y="94" width="132" height="46" rx="14" fill="#111827" stroke="#475569" stroke-width="1.6"/>
  <text x="800" y="123" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="900" fill="#f8fafc">BOSQICH 07</text>

