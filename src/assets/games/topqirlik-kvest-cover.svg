  <text x="118" y="220" font-family="Nunito, Arial, sans-serif" font-size="20" font-weight="800" fill="#bae6fd">Topshiriq</text>
  <text x="118" y="258" font-family="Nunito, Arial, sans-serif" font-size="31" font-weight="900" fill="#f8fafc">Jumboqni yeching va</text>
  <text x="118" y="294" font-family="Nunito, Arial, sans-serif" font-size="31" font-weight="900" fill="#f8fafc">keyingi kalitni toping</text>
  <text x="118" y="332" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="700" fill="#cbd5e1">1) Tahlil qiling</text>
  <text x="118" y="360" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="700" fill="#cbd5e1">2) To'g'ri yo'lni tanlang</text>
  <text x="118" y="388" font-family="Nunito, Arial, sans-serif" font-size="18" font-weight="700" fill="#cbd5e1">3) Bonus eshikni oching</text>
  <rect x="116" y="408" width="210" height="34" rx="12" fill="url(#cyan)" fill-opacity="0.22" stroke="#67e8f9" stroke-opacity="0.52" stroke-width="1.4"/>
  <text x="221" y="431" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="16" font-weight="900" fill="#e0f2fe">VAQT: 30 SONIYA</text>

  <rect x="520" y="174" width="358" height="284" rx="26" fill="#081027" fill-opacity="0.62" stroke="#334155" stroke-width="2"/>

  <circle cx="608" cy="250" r="62" fill="#0f172a" stroke="url(#gold)" stroke-width="5"/>
  <circle cx="608" cy="250" r="36" fill="#111827" stroke="#facc15" stroke-width="2"/>
  <line x1="608" y1="199" x2="608" y2="301" stroke="#fde68a" stroke-width="3"/>
  <line x1="557" y1="250" x2="659" y2="250" stroke="#fde68a" stroke-width="3"/>
  <polygon points="608,206 616,250 608,294 600,250" fill="#fbbf24" filter="url(#glow)"/>
  <text x="608" y="338" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="16" font-weight="900" fill="#fde68a" letter-spacing="1">YO'NALISH</text>

  <rect x="686" y="194" width="164" height="112" rx="18" fill="#0f172a" stroke="#7dd3fc" stroke-opacity="0.55" stroke-width="2"/>
  <text x="768" y="224" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="13" font-weight="800" fill="#bae6fd">BONUS SANDIQ</text>
  <rect x="724" y="238" width="88" height="52" rx="10" fill="#1f2937" stroke="#fcd34d" stroke-width="2"/>
  <rect x="756" y="224" width="24" height="18" rx="8" fill="#1f2937" stroke="#fcd34d" stroke-width="2"/>
  <circle cx="768" cy="264" r="7" fill="#fcd34d"/>

  <g transform="translate(548 356)">
    <rect x="0" y="0" width="304" height="84" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="2"/>
