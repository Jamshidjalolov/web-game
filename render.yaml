services:
  - type: web
    name: game-web-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: game-web-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: game-web-db
    plan: free
